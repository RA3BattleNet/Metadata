name = "ra3-battlenet-metadata"
main = "src/index.js"
compatibility_date = "2024-01-01"

[site]
bucket = "./Output"

# 构建命令配置
[build]
command = "bash build.sh"
# 如果需要监听文件变化，可以配置 watch_dirs
# watch_dirs = ["Metadata", "Ra3.BattleNet.Metadata"]

# 环境变量配置（如果需要）
# [vars]
# ENVIRONMENT = "production"

# 路由配置（可选）
# [[routes]]
# pattern = "metadata.example.com/*"
# zone_name = "example.com"
